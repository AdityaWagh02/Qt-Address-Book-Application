name: Qt Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Qt
        run: |
          sudo apt update
          sudo apt install qtbase5-dev qt5-qmake build-essential

      - name: Build project
        run: |
          qmake qt-addressbook.pro
          make
